name: A股智能分析自动运行（603778专属+Tushare稳定版）

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1-5"  # 北京时间周一至周五9:30自动运行

jobs:
  run-stock:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      LITELLM_MODEL: openai/deepseek-v3
      OPENAI_API_BASE: https://aihubmix.com/v1
      OPENAI_API_KEY: ${{ secrets.AIHUBMIX_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}  # 注入Tushare Token

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 依赖缓存加速
      - name: 缓存Python依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行603778全量分析
        run: python main.py --force-run --stocks 603778
