name: A股智能分析自动运行（全量个股+缓存加速）

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1-5"  # 北京时间周一至周五 9:30 自动运行

jobs:
  run-stock:
    runs-on: ubuntu-latest
    # 强制时区为北京时间（UTC+8）
    env:
      TZ: Asia/Shanghai
      # 直接注入环境变量，确保100%生效
      LITELLM_MODEL: openai/deepseek-v3
      OPENAI_API_BASE: https://aihubmix.com/v1
      OPENAI_API_KEY: ${{ secrets.AIHUBMIX_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 🔥 依赖缓存（安装从54秒→3秒）
      - name: 缓存 Python 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行全量个股分析（强制跳过交易日校验）
        run: python main.py --force-run --no-market-review
